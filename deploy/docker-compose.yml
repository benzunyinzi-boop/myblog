name: myblog

services:
  mysql:
    image: mysql:5.7
    container_name: myblog-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myblog}
      MYSQL_USER: ${MYSQL_USER:-myblog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-myblog123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: myblog-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
        else
          exec redis-server --appendonly yes;
        fi
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: myblog-migrate
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations:ro
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myblog}
      MYSQL_USER: ${MYSQL_USER:-myblog}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-myblog123}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
    command:
      - -path=/migrations
      - -database=mysql://${MYSQL_USER:-myblog}:${MYSQL_PASSWORD:-myblog123}@tcp(mysql:3306)/${MYSQL_DATABASE:-myblog}?charset=utf8mb4\&parseTime=true\&loc=Local
      - up
    restart: "no"

  seed:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
      target: runtime
    container_name: myblog-seed
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      MYBLOG_SERVER_HOST: 0.0.0.0
      MYBLOG_SERVER_PORT: 8080
      MYBLOG_SERVER_MODE: release
      MYBLOG_LOG_LEVEL: info
      MYBLOG_LOG_FORMAT: json
      MYBLOG_LOG_OUTPUT: stdout
      MYBLOG_JWT_SECRET: ${MYBLOG_JWT_SECRET:-change-me-in-prod}
      MYBLOG_JWT_ACCESS_TTL: ${MYBLOG_JWT_ACCESS_TTL:-2h}
      MYBLOG_JWT_REFRESH_TTL: ${MYBLOG_JWT_REFRESH_TTL:-168h}
      MYBLOG_JWT_ISSUER: ${MYBLOG_JWT_ISSUER:-myblog}
      MYBLOG_MYSQL_DSN: ${MYBLOG_MYSQL_DSN:-myblog:myblog123@tcp(mysql:3306)/myblog?charset=utf8mb4&parseTime=true&loc=Local}
      MYBLOG_MYSQL_MAX_OPEN_CONNS: 50
      MYBLOG_MYSQL_MAX_IDLE_CONNS: 10
      MYBLOG_MYSQL_CONN_MAX_LIFETIME: 1h
      MYBLOG_REDIS_ADDR: redis:6379
      MYBLOG_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MYBLOG_REDIS_DB: 0
    entrypoint: ["/usr/local/bin/myblog-seed"]
    command:
      - -config
      - /app/configs/config.example.yaml
      - -username
      - admin
      - -password
      - Admin@123
    restart: "no"

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: myblog-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    environment:
      MYBLOG_SERVER_HOST: 0.0.0.0
      MYBLOG_SERVER_PORT: 8080
      MYBLOG_SERVER_MODE: release
      MYBLOG_LOG_LEVEL: info
      MYBLOG_LOG_FORMAT: json
      MYBLOG_LOG_OUTPUT: stdout
      MYBLOG_JWT_SECRET: ${MYBLOG_JWT_SECRET:-change-me-in-prod}
      MYBLOG_JWT_ACCESS_TTL: ${MYBLOG_JWT_ACCESS_TTL:-2h}
      MYBLOG_JWT_REFRESH_TTL: ${MYBLOG_JWT_REFRESH_TTL:-168h}
      MYBLOG_JWT_ISSUER: ${MYBLOG_JWT_ISSUER:-myblog}
      MYBLOG_MYSQL_DSN: ${MYBLOG_MYSQL_DSN:-myblog:myblog123@tcp(mysql:3306)/myblog?charset=utf8mb4&parseTime=true&loc=Local}
      MYBLOG_MYSQL_MAX_OPEN_CONNS: 50
      MYBLOG_MYSQL_MAX_IDLE_CONNS: 10
      MYBLOG_MYSQL_CONN_MAX_LIFETIME: 1h
      MYBLOG_REDIS_ADDR: redis:6379
      MYBLOG_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MYBLOG_REDIS_DB: 0
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: myblog-nginx
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - uploads_data:/data/uploads:ro
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  uploads_data:
