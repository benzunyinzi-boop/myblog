# myblog 配置模板
# 复制为 config.yaml 并按需修改(config.yaml 已在 .gitignore)
# 任意字段都可通过环境变量覆盖,前缀 MYBLOG_,嵌套用下划线
# 例如:MYBLOG_SERVER_PORT=9090 会覆盖 server.port

server:
  host: 0.0.0.0
  port: 8080
  mode: debug              # debug / release / test
  read_timeout: 15s
  write_timeout: 15s
  shutdown_timeout: 10s

log:
  level: info              # debug / info / warn / error
  format: json             # json / console
  output: stdout           # stdout / file
  file_path: logs/app.log  # output=file 时生效

# M2 启用
mysql:
  dsn: myblog:password@tcp(127.0.0.1:3306)/myblog?charset=utf8mb4&parseTime=true&loc=Local
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 1h

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

jwt:
  secret: change-me-in-prod
  access_ttl: 2h
  refresh_ttl: 168h
  issuer: myblog
